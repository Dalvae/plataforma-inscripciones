name: CI/CD - build, push & deploy to AWS EC2

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Run unit tests (H2 en memoria)
        run: |
          chmod +x ./mvnw
          ./mvnw -B test

  build-and-deploy:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/plataforma-inscripciones:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/plataforma-inscripciones:${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/plataforma-inscripciones:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/plataforma-inscripciones:buildcache,mode=max

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Deploy to EC2 (docker compose)
        env:
          SSH_OPTS: "-i ~/.ssh/id_rsa -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
          HOST: "${{ secrets.USER_SERVER }}@${{ secrets.EC2_HOST }}"
        run: |
          ssh $SSH_OPTS "$HOST" "mkdir -p ~/plataforma"
          scp $SSH_OPTS docker-compose.yml "$HOST":~/plataforma/docker-compose.yml
          ssh $SSH_OPTS "$HOST" bash -s <<'EOF'
            set -e
            cd ~/plataforma
            export APP_IMAGE='${{ secrets.DOCKERHUB_USERNAME }}/plataforma-inscripciones:latest'
            export AWS_REGION='${{ secrets.AWS_REGION }}'
            export AWS_S3_BUCKET='${{ secrets.AWS_S3_BUCKET }}'
            export ORACLE_PASSWORD='${{ secrets.ORACLE_PASSWORD }}'
            export APP_USER='plataforma'
            export APP_USER_PASSWORD='${{ secrets.APP_USER_PASSWORD }}'
            echo '${{ secrets.DOCKERHUB_TOKEN }}' | docker login -u '${{ secrets.DOCKERHUB_USERNAME }}' --password-stdin
            docker compose pull app || true
            docker compose up -d
            docker image prune -f || true
          EOF
