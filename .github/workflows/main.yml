name: Build and Push Docker Image 

on: 
  push:
    branches:
      - main   
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Update db url
        run: |
         db_url_escaped=$(printf '%s\n' "${{ secrets.DB_URL }}" | sed 's/[&/\]/\\&/g')
         sed -i "s|<db_url>|$db_url_escaped|" src/main/resources/application.properties
        shell: bash
      - name: Update db username 
        run: |
         db_username_escaped=$(printf '%s\n' "${{ secrets.DB_USERNAME }}" | sed 's/[&/\]/\\&/g')
         sed -i "s|<db_username>|$db_username_escaped|" src/main/resources/application.properties
        shell: bash
      - name: Update db password 
        run: |
         db_password_escaped=$(printf '%s\n' "${{ secrets.DB_PASSWORD }}" | sed 's/[&/\]/\\&/g')
         sed -i "s|<db_password>|$db_password_escaped|" src/main/resources/application.properties
        shell: bash

      - name: Login to DockerHub
        uses: docker/login-action@v2 
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/plataforma-inscripciones:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/plataforma-inscripciones:${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/plataforma-inscripciones:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/plataforma-inscripciones:buildcache,mode=max

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Deploy to EC2
        run: |
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null ${{ secrets.USER_SERVER }}@${{ secrets.EC2_HOST }} << 'EOF'
            echo ${{ secrets.DOCKERHUB_TOKEN }} | docker login -u ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/plataforma-inscripciones:latest
            docker stop plataforma-inscripciones 2>/dev/null || true
            docker rm plataforma-inscripciones 2>/dev/null || true
            docker run -d \
              --name plataforma-inscripciones \
              -p 8080:8080 \
              ${{ secrets.DOCKERHUB_USERNAME }}/plataforma-inscripciones:latest
          EOF
  
