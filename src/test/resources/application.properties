# Configuracion de pruebas: H2 en memoria, sin config server, sin Oracle ni AWS reales.
spring.application.name=ms-plataforma-online-test
spring.config.import=optional:configserver:

spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=Oracle
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Credenciales AWS ficticias para que el bean S3Client se construya en tests.
aws.s3.region=us-east-1
aws.s3.bucket=test-bucket
aws.accessKeyId=test
aws.secretAccessKey=test
aws.sessionToken=test
